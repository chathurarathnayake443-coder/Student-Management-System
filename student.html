<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/styles/styles.css">
</head>
<body>
<header>
    <nav id="navbar" class="navbar navbar-expand-lg bg-primary position-fixed w-100 top-0">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">IJSE</a>
            <button id="menu_btn" type="button" class="btn btn-info">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
</header>
<main>
    <aside id="sidebar" class="position-fixed bottom-0 margin-auto bg-primary-subtle">
        <ul class="navbar-nav justify-content-end flex-grow-1 pe-3">
            <li class="nav-item m-2">
                <div class="nav-link" >Dashboard</div>
            </li>
            <li class="nav-item m-2 text-primary" id="student_sidebar_tab">
                <div class="nav-link">Student Management</div>
            </li>
            <li class="nav-item m-2" id="course_sidebar_tab">
                <div class="nav-link">Course Management</div>
            </li>
            <li class="nav-item m-2">
                <div class="nav-link">Registration Management</div>
            </li>
        </ul>
    </aside>

    <section id="student_content" class="content p-5">

        <form class="w-50 m-auto">
            <h1 class="text-center">Student Management</h1>
            <div class="mb-3">
                <label for="student_id_input" class="form-label">ID</label>
                <input type="number" class="form-control" id="student_id_input">
            </div>
            <div class="mb-3">
                <label for="student_name_input" class="form-label">Name</label>
                <input type="text" class="form-control" id="student_name_input">
            </div>
            <div class="mb-3">
                <label for="student_nic_input" class="form-label">NIC</label>
                <input type="text" class="form-control" id="student_nic_input">
            </div>
            <div class="mb-3">
                <label for="student_phone_input" class="form-label">Phone</label>
                <input type="text" class="form-control" id="student_phone_input">
            </div>
            <div class="mb-3">
                <label for="student_address_input" class="form-label">Address</label>
                <textarea class="form-control" id="student_address_input" style="height: 100px"></textarea>
            </div>
            <div class="text-end">
                <button type="button" id="student_save_btn" class="btn btn-success">Save</button>
                <button type="button" id="student_update_btn" class="btn btn-primary">Update</button>
                <button type="button" id="student_delete_btn" class="btn btn-danger">Delete</button>
                <button type="reset" id="student_reset_btn" class="btn btn-info">Reset</button>
            </div>
        </form>

        <table class="table m-5">
            <thead>
            <tr>
                <th scope="col">#ID</th>
                <th scope="col">Name</th>
                <th scope="col">NIC</th>
                <th scope="col">Phone</th>
                <th scope="col">Address</th>
            </tr>
            </thead>
            <tbody id="student_tbody">

            </tbody>
        </table>

    </section>

</main>

<script src="assets/lib/jquery-4.0.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
<script>
    let sidebar_open = true;
    $('#menu_btn').on('click', function () {
        if(sidebar_open) {
            $('#sidebar').css({display: 'none'});
            $('.content').css({marginLeft: '0px'});
            sidebar_open = false;
        } else {
            $('#sidebar').css({display: 'block'});
            $('.content').css({marginLeft: '250px'});
            sidebar_open = true;
        }
    })

    $('#course_content').css('display', 'none');

    $('#student_sidebar_tab').on('click', function () {
        $('#course_content').css('display', 'none');
        $('#student_content').css('display', 'block');
    })

    $('#course_sidebar_tab').on('click', function () {
        $('#course_content').css('display', 'block');
        $('#student_content').css('display', 'none');
    })


    // student section

    let student_db_array = [];

    const nic_regex = new RegExp("^(([5,6,7,8,9]{1})([0-9]{1})([0,1,2,3,5,6,7,8]{1})([0-9]{6})([v|V|x|X]))|(([1,2]{1})([0,9]{1})([0-9]{2})([0,1,2,3,5,6,7,8]{1})([0-9]{7}))");
    const phone_regex = new RegExp("^[0]{1}[7]{1}[01245678]{1}[0-9]{7}$");

    // student save

    $('#student_save_btn').on('click', function () {

        let student_id = $('#student_id_input').val();
        let student_name = $('#student_name_input').val();
        let student_nic = $('#student_nic_input').val();
        let student_phone = $('#student_phone_input').val();
        let student_address = $('#student_address_input').val();

        (student_id == "") ? alert('ID Missing') : !nic_regex.test(student_nic)? alert('Invalid NIC')
            : (student_name == "") ? alert('Name Missing') : !phone_regex.test(student_phone) ?
                alert('Invalid Phone Number') : (student_address == "") ? alert('Address Missing') : addToStudents(student_id, student_name, student_nic, student_phone, student_address);

    })

    const addToStudents = (id, name, nic, phone, address) => {
        let student = {
            id: id,
            name: name,
            nic: nic,
            phone: phone,
            address: address,
        }

        student_db_array.push(student);
        addToStudentTable();
    }

    // load student table

    const addToStudentTable = () => {
        $('#student_tbody').empty();

        student_db_array.map((item, index) => {
            let data = `${item.id},${item.name},${item.nic},${item.phone},${item.address}`;
            let newRow = `<tr data-index="${data}"><td>${item.id}</td><td>${item.name}</td><td>${item.nic}</td><td>${item.phone}</td><td>${item.address}</td></tr>`;
            $('#student_tbody').append(newRow);
        })
    }

    // student reset

    $('#student_reset_btn').on('click', function () {
        $('#student_id_input').val("");
        $('#student_name_input').val("");
        $('#student_nic_input').val("");
        $('#student_phone_input').val("");
        $('#student_address_input').val("");
    })

    // load Student Data
    $('#student_tbody').on('click', 'tr' ,function () {
        let obj = student_db_array[$(this).index()];

        $('#student_id_input').val(obj.id);
        $('#student_name_input').val(obj.name);
        $('#student_nic_input').val(obj.nic);
        $('#student_phone_input').val(obj.phone);
        $('#student_address_input').val(obj.address);

        $(this).css('cursor', 'pointer');
    })

    // student update
    $('#student_update_btn').on('click', function () {
        let student_id = $('#student_id_input').val();
        let student_name = $('#student_name_input').val();
        let student_nic = $('#student_nic_input').val();
        let student_phone = $('#student_phone_input').val();
        let student_address = $('#student_address_input').val();

        (student_id == "") ? alert('ID Missing') : !nic_regex.test(student_nic)? alert('Invalid NIC')
            : (student_name == "") ? alert('Name Missing') : !phone_regex.test(student_phone) ?
                alert('Invalid Phone Number') : (student_address == "") ? alert('Address Missing') : updateStudentData(student_id, student_name, student_nic, student_phone, student_address);

    })

    const updateStudentData = (id,name, nic, phone, address) => {
        let obj = student_db_array.find(item => item.id == id);

        if(obj){
            obj.id = id;
            obj.name = name;
            obj.nic = nic;
            obj.phone = phone;
            obj.address = address;
        }
        addToStudentTable();
    }

    // student delete
    $('#student_delete_btn').on('click', function () {
        let student_id = $('#student_id_input').val();

        (student_id == "")? alert('ID Missing') : (!getStudentByID(student_id)) ? alert('Student Not Found') : deleteStudent(student_id);
    })

    // get student by id

    const getStudentByID = (id) => {
        let stuId = student_db_array.find(item => item.id == id);

        return stuId !== undefined;
    }

    const deleteStudent = (id) => {
        let index = student_db_array.findIndex(item => item.id == id);
        student_db_array.splice(index, 1);
        addToStudentTable();
    }
</script>

</body>
</html>
